# Alembic configuration file
# Run: alembic upgrade head     (apply all pending migrations)
#      alembic downgrade -1     (rollback one migration)
#      alembic revision --autogenerate -m "description"  (generate new migration)

[alembic]
# Path to migrations directory
script_location = alembic

# Template for migration file names
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Database URL — reads from environment if set, falls back to .env via pydantic-settings
# Overridden in alembic/env.py using backend.app.config.settings.DATABASE_URL
sqlalchemy.url = postgresql+asyncpg://postgres:postgres@localhost:5432/career_navigator

[post_write_hooks]
# Uncomment to auto-format generated migrations with ruff
# hooks = ruff
# ruff.type = console_scripts
# ruff.entrypoint = ruff
# ruff.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
