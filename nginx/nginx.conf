##############################################################################
# Nginx — Reverse Proxy for Career Navigator
#
# Architecture (production):
#   Internet → Nginx (:80/:443) → api (:8001) / frontend (:3000)
#
# Rate limiting zones:
#   auth_limit   — 5 req/min per IP (login / register)
#   api_limit    — 60 req/min per IP (general API)
#   ws_limit     — 10 connections/IP (WebSocket)
#
# SSL termination:
#   Certbot / Let's Encrypt certs mounted at /etc/letsencrypt/.
#   Uncomment the HTTPS server block and update server_name for production.
#
# ⚠️ CAPACITY NOTE:
#   Nginx handles ~10,000 req/s on a single core (C10k model).
#   For 50 concurrent users this is massively over-spec — no tuning needed.
#   Bottleneck will be FastAPI/PostgreSQL long before Nginx.
##############################################################################

worker_processes auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;

    # ── Performance ───────────────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    gzip on;
    gzip_comp_level 4;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;

    # ── Security headers ──────────────────────────────────────────────────
    server_tokens off;
    add_header X-Frame-Options "SAMEORIGIN"                     always;
    add_header X-Content-Type-Options "nosniff"                 always;
    add_header X-XSS-Protection "1; mode=block"                 always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Rate limiting zones ───────────────────────────────────────────────
    limit_req_zone  $binary_remote_addr zone=auth_limit:10m   rate=5r/m;
    limit_req_zone  $binary_remote_addr zone=api_limit:10m    rate=60r/m;
    limit_conn_zone $binary_remote_addr zone=ws_limit:10m;

    # ── Upstream: FastAPI API ─────────────────────────────────────────────
    upstream api_backend {
        server api:8001;
        keepalive 32;
    }

    # ── Upstream: Next.js Frontend ────────────────────────────────────────
    upstream frontend_backend {
        server frontend:3000;
        keepalive 16;
    }

    # ── HTTP → HTTPS redirect (production) ───────────────────────────────
    # server {
    #     listen 80;
    #     server_name yourapp.com www.yourapp.com;
    #     return 301 https://$host$request_uri;
    # }

    # ── Main server block ─────────────────────────────────────────────────
    server {
        listen 80;
        server_name localhost;

        # Uncomment for HTTPS production:
        # listen 443 ssl http2;
        # ssl_certificate     /etc/letsencrypt/live/yourapp.com/fullchain.pem;
        # ssl_certificate_key /etc/letsencrypt/live/yourapp.com/privkey.pem;
        # ssl_protocols TLSv1.2 TLSv1.3;
        # ssl_ciphers HIGH:!aNULL:!MD5;
        # add_header Strict-Transport-Security "max-age=31536000" always;

        client_max_body_size 20m;   # resume PDF upload limit

        # ── Health check (no rate limit — load balancer probe) ────────────
        location = /health {
            proxy_pass         http://api_backend/health;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            access_log off;
        }

        # ── Auth endpoints (strict rate limit) ────────────────────────────
        location ~ ^/(auth|api/auth)/ {
            limit_req zone=auth_limit burst=10 nodelay;
            limit_req_status 429;

            proxy_pass         http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout    30s;
        }

        # ── WebSocket (artifact progress) ─────────────────────────────────
        location /ws/ {
            limit_conn ws_limit 10;

            proxy_pass         http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_read_timeout 3600s;   # 1h — WebSocket stays open during generation
        }

        # ── API docs (FastAPI Swagger / ReDoc) ────────────────────────────
        location ~ ^/(docs|redoc|openapi.json) {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # ── All other API endpoints ───────────────────────────────────────
        location /api/ {
            limit_req zone=api_limit burst=30 nodelay;
            limit_req_status 429;

            proxy_pass         http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout    120s;   # 2 min — LLM artifact generation
        }

        # ── Users / auth endpoints (non-prefixed) ─────────────────────────
        location ~ ^/(users|auth)/ {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass         http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── Next.js frontend (everything else) ───────────────────────────
        location / {
            proxy_pass         http://frontend_backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_cache_bypass $http_upgrade;
        }

        # ── Static assets (Next.js _next/static) — long cache ─────────────
        location /_next/static/ {
            proxy_pass http://frontend_backend;
            add_header Cache-Control "public, max-age=31536000, immutable";
            access_log off;
        }

        # ── Error pages ───────────────────────────────────────────────────
        error_page 429 @rate_limited;
        location @rate_limited {
            return 429 '{"error": "Rate limit exceeded. Please slow down.", "retry_after": 60}';
            add_header Content-Type application/json;
        }

        error_page 502 503 504 @gateway_error;
        location @gateway_error {
            return 503 '{"error": "Service temporarily unavailable. Please try again."}';
            add_header Content-Type application/json;
        }
    }
}
