    // Deep string replacement function
    function deepCloneAndReplace(obj, replacements) {
        if (!obj) return obj;
        if (typeof obj === 'string') {
            let s = obj;
            for (let [oldStr, newStr] of replacements) {
                s = s.split(oldStr).join(newStr);
            }
            return s;
        }
        if (Array.isArray(obj)) {
            return obj.map(v => deepCloneAndReplace(v, replacements));
        }
        if (typeof obj === 'object') {
            const clone = {};
            for (let k in obj) {
                let newKey = deepCloneAndReplace(k, replacements);
                clone[newKey] = deepCloneAndReplace(obj[k], replacements);
            }
            return clone;
        }
        return obj;
    }
