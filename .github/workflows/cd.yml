##############################################################################
# CD — Continuous Deployment
# Triggers: push to main (after CI passes)
#
# Jobs:
#   build-and-push — Build Docker images + push to GitHub Container Registry
#   deploy         — SSH into VPS and pull + restart containers (optional)
#
# Required GitHub secrets (Settings → Secrets → Actions):
#   GHCR_TOKEN      — GitHub Personal Access Token with write:packages scope
#                     (or use GITHUB_TOKEN automatically)
#   DEPLOY_HOST     — SSH host of your VPS (e.g., 123.456.78.90)
#   DEPLOY_USER     — SSH user (e.g., ubuntu)
#   DEPLOY_KEY      — SSH private key for the deploy user
#   DEPLOY_PATH     — Path on VPS where docker-compose.yml lives
#   POSTGRES_PASSWORD, SECRET_KEY, ANTHROPIC_API_KEY, etc. — prod secrets
#
# ⚠️ The deploy job is optional and gated by a manual approval environment
# named "production". Create it in GitHub → Settings → Environments.
##############################################################################

name: CD

on:
  push:
    branches: [main]

jobs:

  # ── Build + Push Docker images ────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      api_image: ${{ steps.meta-api.outputs.tags }}
      frontend_image: ${{ steps.meta-frontend.outputs.tags }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (for multi-arch builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── API image metadata ────────────────────────────────────────────
      - name: API image metadata
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/api
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      # ── Build and push API image ──────────────────────────────────────
      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.backend
          target: production
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      # ── Frontend image metadata ───────────────────────────────────────
      - name: Frontend image metadata
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/frontend
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      # ── Build and push Frontend image ─────────────────────────────────
      - name: Build and push Frontend image
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/Dockerfile.frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
          build-args: |
            NEXT_PUBLIC_API_URL=https://${{ vars.DOMAIN || 'yourapp.com' }}

  # ── Deploy to VPS (optional — requires "production" environment) ──────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production    # requires manual approval in GitHub UI
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}

            # Pull latest images
            echo "${{ secrets.GITHUB_TOKEN }}" | \
              docker login ghcr.io -u ${{ github.actor }} --password-stdin

            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull

            # Run Alembic migrations before restarting API
            docker compose -f docker-compose.yml -f docker-compose.prod.yml \
              run --rm api \
              alembic upgrade head

            # Rolling restart: worker first (no traffic), then API
            docker compose -f docker-compose.yml -f docker-compose.prod.yml \
              up -d --no-deps worker
            sleep 5
            docker compose -f docker-compose.yml -f docker-compose.prod.yml \
              up -d --no-deps api
            sleep 10
            docker compose -f docker-compose.yml -f docker-compose.prod.yml \
              up -d --no-deps nginx frontend

            # Health check
            curl -f http://localhost/health || (echo "Health check failed!" && exit 1)

            # Clean up old images
            docker image prune -f

            echo "Deployment complete — $(date)"
