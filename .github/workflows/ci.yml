##############################################################################
# CI — Continuous Integration
# Triggers: push to any branch + pull_request targeting main
#
# Jobs:
#   lint     — ruff (Python linter) + ruff format check
#   test     — pytest unit tests (no DB required)
#   frontend — next build (type errors fail the build)
##############################################################################

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── Python lint ────────────────────────────────────────────────────────
  lint:
    name: Python Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: pip install ruff==0.8.0

      - name: Lint (ruff check)
        run: ruff check src/backend/ backend/app/ tests/ --select E,W,F,I --ignore E501

      - name: Format check (ruff format)
        run: ruff format --check src/backend/ backend/app/ tests/

  # ── Python unit tests ─────────────────────────────────────────────────
  test:
    name: Python Tests (pytest)
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          # Install a lightweight subset for unit tests (no sentence-transformers)
          pip install \
            fastapi[standard] \
            pydantic>=2.10.0 \
            pydantic-settings>=2.6.0 \
            python-jose[cryptography] \
            bcrypt>=4.2.0 \
            httpx \
            pytest \
            pytest-asyncio \
            anyio

      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short
        env:
          # Minimal env — unit tests use mocks, no real DB/Redis
          SECRET_KEY: ci-test-secret-key-not-for-production
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/career_navigator
          REDIS_URL: redis://localhost:6379/0

  # ── Frontend build ────────────────────────────────────────────────────
  frontend:
    name: Next.js Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Next.js
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8001
          NEXT_TELEMETRY_DISABLED: 1
