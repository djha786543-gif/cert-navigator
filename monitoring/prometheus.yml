# Prometheus scrape configuration — Career Navigator Phase 7
#
# Start monitoring stack:
#   docker-compose -f docker-compose.monitoring.yml up -d
#
# Then open:
#   Prometheus: http://localhost:9090
#   Grafana:    http://localhost:3001  (admin / admin)

global:
  scrape_interval:     15s   # How often to collect metrics
  evaluation_interval: 15s   # How often to evaluate alerting rules
  scrape_timeout:      10s

  external_labels:
    environment: "local"
    app:         "career-navigator"

# ── Alerting rules ────────────────────────────────────────────────────────────
rule_files:
  - "alerting.yml"

# ── Alert manager (optional — configure if you want email/PagerDuty alerts) ──
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ["alertmanager:9093"]

# ── Scrape targets ────────────────────────────────────────────────────────────
scrape_configs:

  # FastAPI — custom /metrics endpoint (prometheus_client)
  - job_name: "career_api"
    static_configs:
      - targets: ["api:8001"]    # Docker network hostname; use localhost:8001 outside Docker
    metrics_path: "/metrics"
    scrape_interval: 15s

  # Celery worker — expose via prometheus_client in celery_app.py
  # (worker must expose its own /metrics on port 8002 if needed)
  # - job_name: "career_worker"
  #   static_configs:
  #     - targets: ["worker:8002"]

  # PostgreSQL — requires postgres_exporter sidecar
  - job_name: "postgres"
    static_configs:
      - targets: ["postgres_exporter:9187"]
    scrape_interval: 30s

  # Redis — requires redis_exporter sidecar
  - job_name: "redis"
    static_configs:
      - targets: ["redis_exporter:9121"]
    scrape_interval: 30s

  # Nginx — requires nginx-prometheus-exporter sidecar
  - job_name: "nginx"
    static_configs:
      - targets: ["nginx_exporter:9113"]
    scrape_interval: 30s

  # Node (host) — optional: OS-level CPU / RAM / disk
  # - job_name: "node"
  #   static_configs:
  #     - targets: ["node_exporter:9100"]

  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
